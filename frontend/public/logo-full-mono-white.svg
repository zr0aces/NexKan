<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 512" fill="none">
  <defs>
    <!-- Card Cutout Mask for Paper Airplane -->
    <mask id="airplane-mask" maskUnits="userSpaceOnUse">
      <rect x="224" y="144" width="80" height="120" rx="10" fill="white" />
      <g transform="translate(264, 204) rotate(45)">
        <path d="M 0,-22 L 18,14 L 0,5 L -18,14 Z" fill="black" />
        <line x1="0" y1="-22" x2="0" y2="5" stroke="white" stroke-width="2" stroke-linecap="round" />
      </g>
    </mask>
    
    <!-- Gradient for active card -->
    <linearGradient id="brand-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9E00" />
      <stop offset="100%" stop-color="#FF3D00" />
    </linearGradient>
  </defs>
  
  <!-- Embedded Icon component -->
  <g transform="translate(64, 64) scale(0.75)">
    <!-- Spiral Notebook Page Frame -->
    <rect x="108" y="64" width="320" height="384" rx="24" fill="#000000" stroke="#FFFFFF" stroke-width="16" />
    
    <!-- Spiral Loops on Left Edge (Modern curves) -->
    <path d="M 124,106 C 88,106 88,118 124,118" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <path d="M 124,174 C 88,174 88,186 124,186" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <path d="M 124,242 C 88,242 88,254 124,254" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <path d="M 124,310 C 88,310 88,322 124,322" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <path d="M 124,378 C 88,378 88,390 124,390" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    
    <!-- Punch Holes -->
    <circle cx="124" cy="112" r="4" fill="#FFFFFF" opacity="0.4" />
    <circle cx="124" cy="180" r="4" fill="#FFFFFF" opacity="0.4" />
    <circle cx="124" cy="248" r="4" fill="#FFFFFF" opacity="0.4" />
    <circle cx="124" cy="316" r="4" fill="#FFFFFF" opacity="0.4" />
    <circle cx="124" cy="384" r="4" fill="#FFFFFF" opacity="0.4" />
    
    <!-- Column 1 (Todo) Cards -->
    <rect x="136" y="104" width="76" height="64" rx="8" fill="#FFFFFF" fill-opacity="0.2" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.35" />
    <rect x="136" y="184" width="76" height="64" rx="8" fill="#FFFFFF" fill-opacity="0.2" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.35" />
    <rect x="136" y="264" width="76" height="64" rx="8" fill="#FFFFFF" fill-opacity="0.2" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.35" />
    
    <!-- Column 2 (In Progress) Cards -->
    <rect x="224" y="280" width="76" height="64" rx="8" fill="#FFFFFF" fill-opacity="0.2" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.35" />
    <rect x="224" y="144" width="80" height="120" rx="10" fill="#FFFFFF" mask="url(#airplane-mask)" />
    
    <!-- Column 3 (Done) Cards -->
    <rect x="316" y="104" width="76" height="64" rx="8" fill="#FFFFFF" fill-opacity="0.2" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.35" />
    <rect x="316" y="280" width="76" height="64" rx="8" fill="#FFFFFF" fill-opacity="0.2" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.35" />
    
    <!-- Completed Card with checkmark badge -->
    <g>
      <rect x="316" y="184" width="76" height="80" rx="8" fill="#FFFFFF" fill-opacity="0.2" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.35" />
      <circle cx="354" cy="224" r="14" fill="#10B981" />
      <path d="M 347,224 L 352,229 L 361,219" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
  
  <!-- Typography -->
  <text x="512" y="256" font-family="'Inter', 'Prompt', 'Kanit', -apple-system, sans-serif" font-weight="900" font-size="240" dominant-baseline="central">
    <tspan fill="#FFFFFF">Nex</tspan><tspan fill="#FFFFFF">Kan</tspan>
  </text>
</svg>
