volumes:
  frontend-dist:

services:
  backend:
    container_name: nexkan-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "3000"
    volumes:
      - ./data/tasks:/app/data/tasks
      - ./data/scratchpad:/app/data/scratchpad
      - ./data/notifications-sent.json:/app/data/notifications-sent.json
    env_file: .env
    restart: unless-stopped

  frontend:
    container_name: nexkan-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    volumes:
      - frontend-dist:/usr/share/nginx/html
    command: ["cp", "-r", "/app/dist/.", "/usr/share/nginx/html"]
    restart: "no"

  nginx:
    container_name: nexkan-nginx
    image: nginx:alpine
    ports:
      - "${HOST_PORT:-8092}:80"
    volumes:
      - ./nginx/nexkan.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - ./data/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_started
    restart: unless-stopped
