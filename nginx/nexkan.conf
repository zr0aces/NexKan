upstream backend {
    server backend:3000;
    keepalive 4;
}

gzip on;
gzip_types application/json text/html text/css application/javascript application/x-javascript text/javascript;
gzip_min_length 1024;
gzip_vary on;

server {
    listen 80;
    server_name _;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed assets — immutable 1-year cache
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        auth_basic "NexKan";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # Telegram webhook — no auth, secret validated by backend middleware
    location /api/webhooks/telegram {
        auth_basic off;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
    }

    # Cron notification trigger — no auth, X-Cron-Secret validated by backend middleware
    location /api/notifications/check {
        auth_basic off;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Cron-Secret $http_x_cron_secret;
    }

    # All other API routes — basic auth
    location /api/ {
        auth_basic "NexKan";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend static files — basic auth
    location / {
        auth_basic "NexKan";
        auth_basic_user_file /etc/nginx/.htpasswd;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
